image: opensuse/tumbleweed

before_script:
  - zypper -q install -y git

Linux_x64:
  stage: build
  script:
    - zypper -q install -y find libgit2-devel make gcc gcc-c++ libQt6Concurrent-devel libQt6Core-devel libQt6Gui-devel libQt6QuickControls2-devel libqt6-qtbase-devel libqt6-qtdeclarative-devel quazip-qt6-devel
    - make -f CI.mk linuxdeploy
    - make -f CI.mk finalize
  artifacts:
    paths:
      - GitAddonsManager
    name: "GitAddonsManager_Linux_x64-$CI_COMMIT_SHA"

Win32:
  cache:
    paths:  
      - Qt/
      - .wine
      - libgit2-0.27.2
      - mingw32
  stage: build
  script:
    - zypper -q remove -y patterns-base-fips busybox-which
    - zypper -q install -y find wine-staging wine-staging-32bit wget make p7zip tar gzip || true
    - make -f CI.mk windeploy
    - make -f CI.mk finalize
  artifacts:
    paths:
      - GitAddonsManager
    name: "GitAddonsManager_Win32-$CI_COMMIT_SHA"
