before_script:
  - dpkg --add-architecture i386
  - apt-get update -qq && apt-get install -y -qq wine wine32 git qt5-qmake qt5-default qtdeclarative5-dev qtbase5-dev qtquickcontrols2-5-dev libgit2-dev qtbase5-dev libqt5concurrent5 make gcc g++

cache:
  paths:
    - Qt/
    - .wine
    - libgit2-0.27.2
    - mingw32

build:
  stage: build
  script:
    - make -f CI.mk build
  artifacts:
    paths:
      - build/GitAddonsManager
    name: "Linux_x64"

winbuild:
  stage: build
  script:
    - make -f CI.mk windeploy
  artifacts:
    paths:
      - build_win32/deploy/*
    name: "Win32"
